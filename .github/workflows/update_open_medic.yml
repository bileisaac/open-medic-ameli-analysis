name: Update Open Medic report

on:
  workflow_dispatch:
  schedule:
    # Tous les 1er janvier et 1er juillet à 06h00 UTC
    - cron: "0 6 1 1,7 *"

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"

      - name: Setup R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::readxl
            any::janitor
            any::scales
            any::sf
            any::rnaturalearth
            any::rnaturalearthdata
            any::mapsf
            any::treemapify
            any::patchwork
            any::rmarkdown
            any::knitr
            any::stringr
            any::glue
            any::pagedown

      - name: Run Open Medic pipeline
        run: Rscript scripts/00_run_all.R

      - name: Commit updated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Open Medic report"
          file_pattern: "config.R docs/* outputs/figures/* outputs/tableaux/* data/processed/*"
